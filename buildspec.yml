version: 0.2

env:
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: 1
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

phases:
  install:
    runtime-versions:
      dotnet: 8.0
    commands:
      - echo "Installing tools..."
      - dotnet --version
      - npm install -g aws-cdk
      - cdk --version
      - echo "Build started at $(date)"

  pre_build:
    commands:
      - echo "Restoring packages..."
      - cd ServerlessMediaProcessor
      - dotnet restore ServerlessMediaProcessor.sln
      - echo "Solution restored"
      - ls -la

  build:
    commands:
      - echo "Building solution..."
      - dotnet build ServerlessMediaProcessor.sln --configuration Release --no-restore
      - echo "Running unit tests..."
      - dotnet test LambdaHandlers.Tests/LambdaHandlers.Tests.csproj --configuration Release --no-build --verbosity normal
      - echo "Tests passed!"

  post_build:
    commands:
      - echo "Publishing Lambda handlers..."
      - dotnet publish LambdaHandlers/LambdaHandlers.csproj --configuration Release --output LambdaHandlers/bin/Release/net8.0/publish
      - cd LambdaHandlers/bin/Release/net8.0/publish
      - zip -r ../../../../../upload-lambda.zip .
      - cd ../../../../../
      - echo "Uploading Lambda code to S3..."
      - aws s3 cp upload-lambda.zip s3://media-processor-pipeline-artifacts-765891906457/lambda-code/upload-lambda-latest.zip
      - echo "Building Infrastructure project for CDK..."
      - dotnet build Infrastructure/Infrastructure.csproj --configuration Debug
      - echo "Synthesizing CDK templates..."
      - cd Infrastructure
      - cdk synth --output ../cdk.out
      - cd ..
      - echo "Creating build info..."
      - echo "{\"buildId\":\"$CODEBUILD_BUILD_ID\",\"buildNumber\":\"$CODEBUILD_BUILD_NUMBER\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build-info.json
      - echo "Build complete!"
      - ls -lh *.zip
      - du -sh cdk.out

artifacts:
  base-directory: ServerlessMediaProcessor
  files:
    - upload-lambda.zip
    - 'cdk.out/**/*'
    - build-info.json

cache:
  paths:
    - '/root/.nuget/packages/**/*'

reports:
  test-results:
    files:
      - 'ServerlessMediaProcessor/LambdaHandlers.Tests/TestResults/*.trx'
    file-format: 'VisualStudioTrx'
